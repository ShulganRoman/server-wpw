name: Build image from repository_dispatch

on:
  repository_dispatch:
    types:
      - build-frontend
      - build-backend

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAMESPACE: ShulganRoman

    steps:
      - name: Read payload
        id: payload
        run: |
          echo "service=${{ github.event.client_payload.service }}" >> $GITHUB_OUTPUT
          echo "source_repo=${{ github.event.client_payload.source_repo }}" >> $GITHUB_OUTPUT
          echo "source_ref=${{ github.event.client_payload.source_ref }}" >> $GITHUB_OUTPUT
          echo "source_sha=${{ github.event.client_payload.source_sha }}" >> $GITHUB_OUTPUT

      - name: Debug payload
        run: |
          echo "SERVICE=${{ steps.payload.outputs.service }}"
          echo "SOURCE_REPO=${{ steps.payload.outputs.source_repo }}"
          echo "SOURCE_REF=${{ steps.payload.outputs.source_ref }}"
          echo "SOURCE_SHA=${{ steps.payload.outputs.source_sha }}"

      - name: Checkout source repository at exact commit
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.payload.outputs.source_repo }}
          ref: ${{ steps.payload.outputs.source_sha }}
          path: app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: |
          case "${{ steps.payload.outputs.service }}" in
            frontend)
              echo "name=${REGISTRY}/${IMAGE_NAMESPACE}/wpw-frontend" >> $GITHUB_OUTPUT
              ;;
            backend)
              echo "name=${REGISTRY}/${IMAGE_NAMESPACE}/wpw-backend" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown service: ${{ steps.payload.outputs.service }}"
              exit 1
              ;;
          esac

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.payload.outputs.source_sha }}
